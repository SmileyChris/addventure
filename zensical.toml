[project]
site_name = "Addventure"
site_description = "A compiler for paper-based text adventures where addition is the parser"
site_url = "https://addventure.dev"
site_dir = "site/build"
extra_css = ["stylesheets/extra.css"]

[project.theme]
variant = "modern"
font = false
custom_dir = "overrides"
logo = "assets/images/logo.png"
favicon = "assets/images/favicon.png"

[project.theme.palette]
scheme = "slate"
primary = "custom"
accent = "custom"

[[project.nav]]
"Home" = "index.md"

[[project.nav]]
"Getting Started" = "getting-started.md"

[[project.nav]]
"Writing Rooms" = "writing-rooms.md"

[[project.nav]]
"State & Transformation" = "state-and-transformation.md"

[[project.nav]]
"Advanced Mechanics" = "advanced.md"

[[project.nav]]
"Script Reference" = "reference.md"
